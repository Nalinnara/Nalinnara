    padding var(--dur-chrome) var(--ease-chrome),

/* ================= SHOP TITLE GLOW ================= */
.shop-title,
.admin-title{
  font-weight: var(--title-weight);
  font-size: var(--title-size);
  letter-spacing: .15px;
  color: var(--text-primary);

  display: inline-flex;
  align-items: center;
  padding: 6px 11px;
  border-radius: 999px;
  position: relative;
  overflow: hidden;
  isolation: isolate; /* Ã°Å¸â€Â´ FIX: Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ layer Ã Â¹â‚¬Ã Â¸Å¾Ã Â¸ÂµÃ Â¹â€°Ã Â¸Â¢Ã Â¸â„¢ */

  /* Ã°Å¸â€Â´ CHANGED: dark glass base */
  background: var(--surface-glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(16px) saturate(170%);
  -webkit-backdrop-filter: blur(16px) saturate(170%);

  /* Ã°Å¸â€Â´ CHANGED: softer dark-depth inner rim */
  box-shadow:
    var(--shadow-control),
    inset 0 1px 0 var(--inner-highlight),
    inset 0 -1px 0 var(--header-border);

  /* Ã°Å¸â€Â´ CHANGED: remove white glow feeling */
  text-shadow: 0 1px 0 rgba(0,0,0,.35);

  z-index: 0;
}

/* Ã¢Å“â€¦ Glass highlight (top-left glare) */
.shop-title::before,
.admin-title::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:0; /* Ã°Å¸â€Â´ FIX: Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° -1 */
  background:
    radial-gradient(70% 55% at 28% 22%,
      rgba(255,255,255,.20) 0%,
      rgba(255,255,255,.10) 26%,
      rgba(255,255,255,0) 60%);
  opacity:.55;
  pointer-events:none;
  mix-blend-mode: screen;
}

/* ================= BUTTON SYSTEM ================= */

.btn {
  padding: 12px;
  min-height: 44px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition:
    transform var(--dur-tap) var(--ease-tap),
    box-shadow var(--dur-tap) ease,
    filter var(--dur-tap) ease;
}

/* Primary */
.btn-primary {
  background: var(--primary);
  color: var(--primary-text);
}

/* Secondary / neutral utility */
.btn-secondary {
  background: var(--secondary);
  color: var(--text);
  border: 1px solid var(--border);
}

/* Success / completed action */
.btn-success {
  background: var(--success);
  color: var(--primary-text);
}

/* Outline / low-emphasis action */
.btn-outline {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-strong);
}

/* Danger (logout / destructive) */
.btn-danger{
  background:var(--danger);
  color:var(--primary-text);
}
.btn-danger:active{
  transform: scale(var(--tap-scale-primary));
}

/* Interaction */
.btn:active {
  transform: scale(var(--tap-scale-primary));
  filter: brightness(.96);
  box-shadow: var(--shadow-card-pressed);
}

.btn.is-submitting{
  filter: saturate(.9) brightness(.92);
  cursor: wait;
  box-shadow: var(--shadow-card-pressed);
}

.menu-btn{

/* Ã¢Å“â€¦ Glass highlight (like filter) */
.menu-btn::before{

/* ===== Animation (namespaced) ===== */
@keyframes toast-slide-down {
  from {

    opacity: 1;
    transform: translateY(0) scale(1);

/* ================= FLOATING BOTTOM BAR ================= */

/* Ã°Å¸â€Â´ CHANGED: Clean + deterministic cascade (Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ opacity Ã Â¸ÂªÃ Â¸Â¥Ã Â¸Â±Ã Â¸Å¡Ã Â¸â€”Ã Â¸Â´Ã Â¸Â¨) */
#floatingBar{
  position: fixed !important;
  left: 16px;
  right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 18px) !important;
  max-width: 520px;
  margin: 0 auto;

  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 18px;

  background: var(--sheet-bg);
backdrop-filter: blur(36px) saturate(220%);
-webkit-backdrop-filter: blur(36px);

border: 1px solid var(--border-strong);
  box-shadow:
    var(--shadow-floating),
    inset 0 1px 0 var(--inner-highlight);
  color: var(--text);

  z-index: 999;

  /* default = hidden */
  transform: translateY(120%);
  opacity: 0;
  pointer-events: none;
  visibility: hidden;            /* Ã°Å¸â€Â FIX: Ã Â¸Å¡Ã Â¸Â±Ã Â¸â€¡Ã Â¸â€žÃ Â¸Â±Ã Â¸Å¡Ã Â¸â€¹Ã Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡ (Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ opacity Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²Ã Â¸â€¡) */

  transition:
    transform .48s cubic-bezier(.34,1.56,.64,1),
    opacity .3s ease;
  will-change: transform, opacity;
}

/* Ã¢Å“â€¦ Cart bar text readability (Ã Â¹â‚¬Ã Â¸â€°Ã Â¸Å¾Ã Â¸Â²Ã Â¸Â° floatingBar) */
#floatingBar .bar-left{
  min-width: 0;
}
#floatingBar .bar-subtext{
  font-size: 13px;
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#floatingBar .cart-badge{
  position:absolute;
  top:-8px;
  right:12px;
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#e53935;
  color:#fff;
  font-size:11px;
  font-weight:900;
  line-height:1;
  box-shadow:0 8px 18px rgba(229,57,53,.32);
  border:2px solid var(--surface);
  pointer-events:none;
}

#floatingBar .cart-badge.cart-badge-pop{
  animation:cart-badge-pop var(--motion-duration-normal) var(--motion-ease-emphasized);
}

@keyframes cart-badge-pop{
  0%   { transform:scale(.72); }
  55%  { transform:scale(1.22); }
  100% { transform:scale(1); }
}

#floatingBar.bounce-in{
  animation: float-bounce .65s cubic-bezier(.34,1.56,.64,1);
}
#floatingBar.cart-added-pulse{
  animation: cart-added-pulse var(--motion-duration-normal) var(--motion-ease-emphasized);
}
@keyframes float-bounce{
  0%   { transform:translateY(120%) scale(.94); }
  60%  { transform:translateY(-6px) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}
@keyframes cart-added-pulse{
  0%   { transform:translateY(0) scale(1); }
  45%  { transform:translateY(-2px) scale(1.018); }
  100% { transform:translateY(0) scale(1); }
}

#floatingBar .total-animate{ animation: total-pop .25s ease; }
@keyframes total-pop{
  0%   { transform:scale(.92); opacity:.6; }
  100% { transform:scale(1); opacity:1; }
}

/* Ã¢Å“â€¦ SHOW = only show */
 #floatingBar.show{
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
  visibility: visible; /* Ã°Å¸â€Â´ FIX: Ã Â¹â‚¬Ã Â¸Å¾Ã Â¸Â£Ã Â¸Â²Ã Â¸Â° default Ã Â¸â€¢Ã Â¸Â±Ã Â¹â€°Ã Â¸â€¡ hidden Ã Â¹â€žÃ Â¸Â§Ã Â¹â€° */
 }

/* Ã¢Å“â€¦ HIDE (scroll) */
#floatingBar.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

/* Ã¢Å“â€¦ HIGHEST PRIORITY: show + scroll-hide must hide */
#floatingBar.show.scroll-hide{
  transform: translateY(120%) !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

#floatingBar:active{
  transform: translateY(0) scale(.98);
}

/* Ã°Å¸â€Â´ NEW: Ã Â¹â‚¬Ã Â¸Â¡Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸Â¡Ã Â¸Âµ sheet Ã Â¹â‚¬Ã Â¸â€ºÃ Â¸Â´Ã Â¸â€Ã Â¸Â­Ã Â¸Â¢Ã Â¸Â¹Ã Â¹Ë† Ã¢â€ â€™ Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€° floatingBar Ã Â¸â€¹Ã Â¹Ë†Ã Â¸Â­Ã Â¸â„¢ */
.sheet.show ~ #floatingBar{
  opacity: 0 !important;
  transform: translateY(20px) !important;
  pointer-events: none !important;
  visibility: hidden !important; /* Ã°Å¸â€Â´ FIX: Ã Â¸â€¹Ã Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¹ÂÃ Â¸Å¡Ã Â¸Å¡ deterministic */
}

 /* ================= REDUCED MOTION SUPPORT ================= */
 @media (prefers-reduced-motion: reduce){

   /* Ã°Å¸â€Â´ Disable global transitions */
   * {
     transition: none !important;
     animation: none !important;   /* Ã°Å¸â€Â´ ADD */
   }

   /* Ã°Å¸â€Â´ Disable product card motion */
   .product-card{
     transition: none !important;
   }

   .product-card:hover{
     transform: none !important;
     box-shadow: var(--shadow-card) !important;
   }

   .product-card:active{
     transform: none !important;
   }

   /* Ã°Å¸â€Â´ Disable floating bar animations */
   #floatingBar,
   #floatingBar.bounce-in,
   #floatingBar.cart-added-pulse{
     transition: none !important;
     animation: none !important;
   }

   #floatingBar .total-animate{
     animation: none !important;
   }

   #floatingBar .cart-badge.cart-badge-pop{
     animation: none !important;
   }

   /* Ã°Å¸â€Â´ Disable toast slide animation */
   .toast{
     animation: none !important;
   }

   /* Ã°Å¸â€Â´ Disable spinner rotation */
   .spinner{
     animation: none !important;
   }
 }

function t(key, fallback = "") {
  const lang = getCurrentLang();
  return UI_TEXT[lang]?.[key] ?? UI_TEXT[DEFAULT_LANG]?.[key] ?? fallback;

function formatUiText(key, values = {}, fallback = "") {
  return Object.entries(values).reduce(
    (text, [name, value]) => text.replaceAll(`{${name}}`, String(value ?? "")),
    t(key, fallback)
  );
}

function setTheme(theme) {
  const safeTheme = theme === "cute" ? "cute" : "dark";
  if (document.body) {
    document.body.dataset.theme = safeTheme;
  }

  try {
    localStorage.setItem(THEME_KEY, safeTheme);
  } catch (err) {
    console.warn("setTheme: localStorage unavailable", err);
  }
}

function initTheme() {
  let savedTheme = "dark";
  try {
    const rawTheme = localStorage.getItem(THEME_KEY);
    savedTheme = rawTheme === "cute" || rawTheme === "dark" ? rawTheme : "dark";
  } catch (err) {
    console.warn("initTheme: localStorage unavailable", err);
  }
  setTheme(savedTheme);
}

function toggleTheme() {
  const nextTheme = getCurrentTheme() === "cute" ? "dark" : "cute";
  setTheme(nextTheme);
  openMainMenu();
}

}

function replayMotionClass(el, className, duration = MOTION.DURATION_NORMAL_MS) {

function getNextProductId(currentValue = "") {
  const raw = String(currentValue || "").trim().toUpperCase();

  // Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° prefix Ã Â¸Ë†Ã Â¸Â²Ã Â¸ÂÃ Â¸â€žÃ Â¹Ë†Ã Â¸Â²Ã Â¸â€ºÃ Â¸Â±Ã Â¸Ë†Ã Â¸Ë†Ã Â¸Â¸Ã Â¸Å¡Ã Â¸Â±Ã Â¸â„¢Ã Â¸ÂÃ Â¹Ë†Ã Â¸Â­Ã Â¸â„¢ Ã Â¹â‚¬Ã Â¸Å Ã Â¹Ë†Ã Â¸â„¢ A001 => A
  // Ã Â¸â€“Ã Â¹â€°Ã Â¸Â²Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Â¡Ã Â¸Âµ Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€° fallback Ã Â¸Ë†Ã Â¸Â²Ã Â¸ÂÃ Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¸Â¡Ã Â¸ÂµÃ Â¸Â­Ã Â¸Â¢Ã Â¸Â¹Ã Â¹Ë† Ã Â¸Â«Ã Â¸Â£Ã Â¸Â·Ã Â¸Â­Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° "A"
  let prefix = "";
  const currentMatch = raw.match(/^([A-Z]+)(\d+)$/);
  if (currentMatch) {
    prefix = currentMatch[1];
  }

  const productIds = Array.isArray(state.products)
    ? state.products
        .map(p => String(p.productId || "").trim().toUpperCase())
        .filter(Boolean)
    : [];

  if (!prefix) {
    const lastMatch = [...productIds]
      .reverse()
      .map(id => id.match(/^([A-Z]+)(\d+)$/))
      .find(Boolean);

    prefix = lastMatch ? lastMatch[1] : "A";
  }

  const samePrefixMatches = productIds
    .map(id => id.match(/^([A-Z]+)(\d+)$/))
    .filter(match => match && match[1] === prefix);

  let maxNum = 0;
  samePrefixMatches.forEach(match => {
    const num = Number(match[2]);
    if (Number.isFinite(num) && num > maxNum) {
      maxNum = num;
    }
  });

  const nextNum = maxNum + 1;
  return `${prefix}${String(nextNum).padStart(3, "0")}`;
}

  const container = document.getElementById('toast-container');

  container.appendChild(toast);

    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

/* ================= SAFE HIDE LOADING (SINGLE SOURCE OF TRUTH) ================= */
/**
 * Ã¢Ââ€” IMPORTANT
 * - Ã Â¸â€¢Ã Â¹â€°Ã Â¸Â­Ã Â¸â€¡Ã Â¸Â¡Ã Â¸Âµ safeHideLoading Ã Â¹ÂÃ Â¸â€žÃ Â¹Ë†Ã Â¸â€¢Ã Â¸Â±Ã Â¸Â§Ã Â¹â‚¬Ã Â¸â€Ã Â¸ÂµÃ Â¸Â¢Ã Â¸Â§Ã Â¹Æ’Ã Â¸â„¢Ã Â¸Â£Ã Â¸Â°Ã Â¸Å¡Ã Â¸Å¡
 * - Ã Â¸â€¢Ã Â¸Â±Ã Â¸Â§Ã Â¸â„¢Ã Â¸ÂµÃ Â¹â€°Ã Â¸â€žÃ Â¸Â·Ã Â¸Â­Ã Â¹â‚¬Ã Â¸Â§Ã Â¸Â­Ã Â¸Â£Ã Â¹Å’Ã Â¸Å Ã Â¸Â±Ã Â¸â„¢Ã Â¹â‚¬Ã Â¸â€Ã Â¸ÂµÃ Â¸Â¢Ã Â¸Â§Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¸Â¸Ã Â¸ÂÃ Â¸Â²Ã Â¸â€¢Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€°Ã Â¹Æ’Ã Â¸Å Ã Â¹â€°
 */

function safeHideLoading(fromTimeout = false) {
  const overlay = document.getElementById("loading-overlay");

  const elapsed = Date.now() - (_loadingShownAt || 0);
  const delay = Math.max(0, MIN_LOADING_MS - elapsed);

  setTimeout(() => {
    try {
      if (overlay) {
        overlay.classList.add("hidden");
        overlay.setAttribute("aria-hidden", "true");
        overlay.setAttribute("aria-busy", "false");
      }

      // Ã°Å¸â€Â¥ Ã Â¸Â«Ã Â¸Â±Ã Â¸Â§Ã Â¹Æ’Ã Â¸Ë†: Ã Â¹â‚¬Ã Â¸â€žÃ Â¸Â¥Ã Â¸ÂµÃ Â¸Â¢Ã Â¸Â£Ã Â¹Å’ timer Ã Â¸â€šÃ Â¸Â­Ã Â¸â€¡ showLoading
      if (_loadingTimer) {
        clearTimeout(_loadingTimer);
        _loadingTimer = null;
      }
      // Ã°Å¸â€â€™ Ã Â¸â€ºÃ Â¸Â¥Ã Â¸â€ lock Ã Â¹â‚¬Ã Â¸â€°Ã Â¸Å¾Ã Â¸Â²Ã Â¸Â°Ã Â¹â‚¬Ã Â¸Â¡Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Â¡Ã Â¸Âµ overlay Ã Â¹â‚¬Ã Â¸â€ºÃ Â¸Â´Ã Â¸â€Ã Â¸Â­Ã Â¸Â¢Ã Â¸Â¹Ã Â¹Ë† (Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ confirm/flow Ã Â¸Â«Ã Â¸Â¥Ã Â¸Â¸Ã Â¸â€)
      if (state.ui.overlayCount === 0) {
        state.ui.backdropLocked = false;
      }

      if (state.ui.overlayCount === 0 && backdrop) {
        backdrop.style.display = "none";
      }

      console.log(
        "[safeHideLoading] loading closed",
        fromTimeout ? "(timeout)" : ""
      );

    } catch (e) {
      console.error("[safeHideLoading] failed", e);
    }
  }, delay);
}

async function fetchWithTimeout(input, init = {}, ms = 30000) {
  const controller = new AbortController();
  const signal = controller.signal;
  const id = setTimeout(() => controller.abort(), ms);

  try {
    const res = await fetch(input, { ...init, signal });

    // Ã°Å¸â€â€™ Ã Â¹â‚¬Ã Â¸Å Ã Â¹â€¡Ã Â¸â€ž HTTP status Ã Â¸Å Ã Â¸Â±Ã Â¸â€Ã Â¹â‚¬Ã Â¸Ë†Ã Â¸â„¢
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    return res;

  } catch (err) {
    if (err.name === "AbortError") {
      throw new Error(t("connectionSlowRetry", "Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¹â‚¬Ã Â¸Å Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸Â¡Ã Â¸â€¢Ã Â¹Ë†Ã Â¸Â­Ã Â¸Å Ã Â¹â€°Ã Â¸Â²Ã Â¹â‚¬Ã Â¸ÂÃ Â¸Â´Ã Â¸â„¢Ã Â¹â€žÃ Â¸â€º Ã Â¸ÂÃ Â¸Â£Ã Â¸Â¸Ã Â¸â€œÃ Â¸Â²Ã Â¸Â¥Ã Â¸Â­Ã Â¸â€¡Ã Â¹Æ’Ã Â¸Â«Ã Â¸Â¡Ã Â¹Ë†Ã Â¸Â­Ã Â¸ÂµÃ Â¸ÂÃ Â¸â€žÃ Â¸Â£Ã Â¸Â±Ã Â¹â€°Ã Â¸â€¡"));
    }
    throw err;
  } finally {
    clearTimeout(id);
  }
}

async function createOrder() {
  // Ã°Å¸â€Â´ HARDENING: reload stock snapshot before submit
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      throw new Error(`Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Å¾Ã Â¸Å¡Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â² ${item.name}`);
    }

    if (Number(product.stock) < Number(item.qty)) {
      throw new Error(
        `${item.name} Ã Â¸â€žÃ Â¸â€¡Ã Â¹â‚¬Ã Â¸Â«Ã Â¸Â¥Ã Â¸Â·Ã Â¸Â­ ${product.stock} Ã Â¸Å Ã Â¸Â´Ã Â¹â€°Ã Â¸â„¢ (Ã Â¸â€žÃ Â¸Â¸Ã Â¸â€œÃ Â¹â‚¬Ã Â¸Â¥Ã Â¸Â·Ã Â¸Â­Ã Â¸Â ${item.qty})`
      );
    }
  }

  const total = state.cart.reduce(
   (s,i)=> s + Number(i.price) * Number(i.qty),
   0
 );

  const form = new URLSearchParams();
  form.append("action", "createOrder");
  form.append("items", JSON.stringify(state.cart));
  form.append("total", total);
  form.append("poNumber", String(state.poNumber || "").trim());

  // Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° fetchWithTimeout Ã Â¹â‚¬Ã Â¸Å¾Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸â€ºÃ Â¹â€°Ã Â¸Â­Ã Â¸â€¡Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ request Ã Â¹ÂÃ Â¸â€šÃ Â¸Â§Ã Â¸â„¢
  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 15000);

  // Ã°Å¸â€Â´ FIX: Ã Â¹â‚¬Ã Â¸Å Ã Â¹â€¡Ã Â¸â€ž HTTP status Ã Â¸ÂÃ Â¹Ë†Ã Â¸Â­Ã Â¸â„¢
  if (!res.ok) {
    const text = await res.text();
    throw new Error(
      `CreateOrder HTTP ${res.status}: ${text}`
    );
  }

  const json = await res.json();

  // Ã°Å¸â€Â´ FIX: validate response shape
  if (!json || json.success !== true || !json.data?.orderId) {
    throw new Error("Invalid createOrder response");
  }

  return json;
}

function syncOverlayBackdropState() {
  const activeOverlays = document.querySelectorAll(".sheet.show, .side-menu.show");
  state.ui.overlayCount = activeOverlays.length;

  if (!backdrop) return;

  if (state.ui.overlayCount > 0 || state.ui.backdropLocked) {
    backdrop.style.display = "block";
  } else {
    backdrop.style.display = "none";
  }
}

async function checkStockBeforeSubmit() {
  const latestProducts = await fetchProducts();

  for (const item of state.cart) {
    const product = latestProducts.find(
      p => p.productId === item.productId
    );

    if (!product) {
      return {
        ok:false,
        message: formatUiText("productNotFound", { name: item.name }, `Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Å¾Ã Â¸Å¡Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â² ${item.name}`)
      };
    }

    if (Number(product.stock) < Number(item.qty)) {
      return {
        ok:false,
        message: formatUiText(
          "stockCheckRemaining",
          { name: item.name, stock: product.stock, qty: item.qty },
          `${item.name} Ã Â¸â€žÃ Â¸â€¡Ã Â¹â‚¬Ã Â¸Â«Ã Â¸Â¥Ã Â¸Â·Ã Â¸Â­ ${product.stock} Ã Â¸Å Ã Â¸Â´Ã Â¹â€°Ã Â¸â„¢ (Ã Â¸â€žÃ Â¸Â¸Ã Â¸â€œÃ Â¹â‚¬Ã Â¸Â¥Ã Â¸Â·Ã Â¸Â­Ã Â¸Â ${item.qty})`
        )
      };
    }
  }

  return { ok:true };
}

// Ã°Å¸â€â€™ Global HTML Escape (XSS Guard) Ã¢â‚¬â€ micro polish: escape &, <, >, ", '
 const esc = (s) =>
   String(s ?? "")
     .replace(/&/g, "&amp;")
     .replace(/</g, "&lt;")
     .replace(/>/g, "&gt;")
     .replace(/"/g, "&quot;")
     .replace(/'/g, "&#39;");

 // Ã°Å¸â€â€™ Attribute-safe (Ã Â¸ÂªÃ Â¸Â³Ã Â¸Â«Ã Â¸Â£Ã Â¸Â±Ã Â¸Å¡ src/alt/href)
 const escAttr = (s) => esc(s);

function toInlineJsStringLiteral(value) {
  return "'" + String(value ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "\\x22")
    .replace(/&/g, "\\x26")
    .replace(/</g, "\\x3C")
    .replace(/>/g, "\\x3E")
    .replace(/\r/g, "\\r")
    .replace(/\n/g, "\\n")
    .replace(/\u2028/g, "\\u2028")
    .replace(/\u2029/g, "\\u2029") + "'";
}

function handleKeyboardActivation(event, element) {
  if (!event || !element) return;
  if (event.key !== "Enter" && event.key !== " ") return;
  event.preventDefault();
  element.click();
}

function getResolvedProductStatus(product) {
  const stockNum = Number(product?.stock);
  return stockNum <= 0
    ? "out"
    : String(product?.status || "ready").trim().toLowerCase();
}

function isViewerVariantProduct(product) {
  return !!(
    product &&
    String(product.parentProductId || "").trim() &&
    String(product.displayName || "").trim() &&
    String(product.variantType || "").trim().toLowerCase() === "size" &&
    String(product.variantValue || "").trim()
  );
}

function getVariantGroupKey(product) {
  return [
    String(product?.parentProductId || "").trim(),
    String(product?.displayName || "").trim(),
    String(product?.variantType || "").trim().toLowerCase()
  ].join("::");
}

function sortVariantsByOrder(variants) {
  return [...(variants || [])].sort((a, b) => {
    const aOrder = Number(a.variantSortOrder);
    const bOrder = Number(b.variantSortOrder);
    const safeA = Number.isFinite(aOrder) ? aOrder : 9999;
    const safeB = Number.isFinite(bOrder) ? bOrder : 9999;
    if (safeA !== safeB) return safeA - safeB;
    return String(a.variantValue || "").localeCompare(String(b.variantValue || ""));
  });
}

function buildViewerProductGroups(products) {
  const groups = new Map();
  const output = [];

  (Array.isArray(products) ? products : []).forEach(product => {
    if (!product || product.active === false) return;
    const resolvedStatus = getResolvedProductStatus(product);
    const safeProduct = { ...product, resolvedStatus };

    if (!isViewerVariantProduct(safeProduct)) {
      output.push(safeProduct);
      return;
    }

    const groupKey = getVariantGroupKey(safeProduct);
    if (!groups.has(groupKey)) {
      const group = {
        isVariantGroup: true,
        groupKey,
        parentProductId: String(safeProduct.parentProductId || "").trim(),
        displayName: String(safeProduct.displayName || safeProduct.name || "").trim(),
        variantType: "size",
        variants: [],
        image: "",
        resolvedStatus: "ready"
      };
      groups.set(groupKey, group);
      output.push(group);
    }

    groups.get(groupKey).variants.push(safeProduct);
  });

  groups.forEach(group => {
    group.variants = sortVariantsByOrder(group.variants);
    group.image = String(group.variants.find(item => item.image)?.image || "").trim();
    group.resolvedStatus = getVariantGroupResolvedStatus(group);
  });

  return output;
}

function getVariantGroupResolvedStatus(group) {
  const variants = group?.variants || [];
  if (!variants.length) return "out";
  const available = variants.find(variant => getResolvedProductStatus(variant) !== "out" && Number(variant.stock) > 0);
  return available ? getResolvedProductStatus(available) : "out";
}

function getVariantGroupPriceLabel(group) {
  const prices = (group?.variants || [])
    .map(variant => Number(variant.price))
    .filter(price => Number.isFinite(price));
  if (!prices.length) return "Ã Â¸Â¿0";
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  return min === max
    ? `Ã Â¸Â¿${min.toLocaleString()}`
    : `Ã Â¸Â¿${min.toLocaleString()} - Ã Â¸Â¿${max.toLocaleString()}`;
}

function getVariantGroupTotalStock(group) {
  return (group?.variants || []).reduce((sum, variant) => sum + (Number(variant.stock) || 0), 0);
}

function getSelectedVariantFromGroup(group) {
  if (!group?.isVariantGroup) return null;
  const selectedId = state.viewerVariantSelections[group.groupKey];
  return group.variants.find(variant => String(variant.productId) === String(selectedId)) || null;
}

function getViewerVariantGroupByKey(groupKey) {
  return buildViewerProductGroups(state.products)

function getViewerItemSearchText(item) {
  if (item?.isVariantGroup) {

      item.displayName,
      item.parentProductId,
      ...(item.variants || []).flatMap(variant => [
        variant.productId,
        variant.name,
        variant.variantValue,
        variant.displayName,
        variant.parentProductId
      ])
    ].join(" ").toLowerCase();
  }
  return [
    item?.name,
    item?.productId,
    item?.displayName,
    item?.parentProductId,
    item?.variantValue
  ].join(" ").toLowerCase();
}

function matchesViewerFilters(item) {
  const search = String(state.search || "").trim().toLowerCase();
  if (search && !getViewerItemSearchText(item).includes(search)) return false;

  const statusFilter = state.viewerFilter?.status || "all";
  if (statusFilter === "all") return true;

  if (item?.isVariantGroup) {
    return (item.variants || []).some(variant => getResolvedProductStatus(variant) === statusFilter);
  }
  return item.resolvedStatus === statusFilter;
}

  if (!Array.isArray(state.products)) {
    console.error("renderProducts: products is not array", state.products);
    app.innerHTML = `

  const filteredProducts = [];

  if (state.mode === "viewer") {
    buildViewerProductGroups(state.products)

  } else {
    state.products.forEach(p => {
      const resolvedStatus = getResolvedProductStatus(p);

function getCartItemImageUrl(item) {
  const existingImage = String(item?.image || "").trim();
  if (existingImage) return existingImage;

  const product = Array.isArray(state.products)
    ? state.products.find(p => String(p.productId || "") === String(item?.productId || ""))
    : null;
  return String(product?.image || "").trim();
}

 let lastFocusTrigger = null;

 function rememberTrigger(el){
   if (el instanceof HTMLElement) lastFocusTrigger = el;
 }

 function restoreTriggerFocus(){
   if (lastFocusTrigger && typeof lastFocusTrigger.focus === "function") {
     lastFocusTrigger.focus();
   }
 }

 function syncExpanded(button, expanded){
   if (button) button.setAttribute("aria-expanded", String(!!expanded));
 }

 function focusFirstInteractive(container){
   if (!container) return;
   const first = container.querySelector(
     'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
   );
   (first || container).focus();
 }

function toggleViewerSearch(triggerEl){

  if(!wrap || !input) return;

    setTimeout(()=>input.focus(),80);
  }
}

function toggleFilterDropdown(triggerEl){
  const el = document.getElementById("filterDropdown");
  if(!el) return;

  const btn = triggerEl || document.querySelector(".filter-btn");
  rememberTrigger(btn);
  const isOpen = el.classList.contains("show");

  document.querySelectorAll(".filter-dropdown.show")
    .forEach(d => d.classList.remove("show"));
  document.querySelectorAll(".filter-btn[aria-expanded='true']")
    .forEach(b => syncExpanded(b, false));

  if(!isOpen){
    el.classList.add("show");
     syncExpanded(btn, true);
     setTimeout(() => focusFirstInteractive(el), 0);

    // Ã°Å¸â€Â´ auto close on outside click
    setTimeout(()=>{
      document.addEventListener("click", closeFilterOnOutside, { once:true });
    }, 0);
   } else {
     restoreTriggerFocus();
  }
}

function closeFilterOnOutside(e){

   document.querySelectorAll(".filter-btn[aria-expanded='true']")
     .forEach(b => syncExpanded(b, false));

function toYmdLocal(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return "";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function formatThaiDate(value) {

  if (!value) return "-";

  const d = new Date(value);

  if (Number.isNaN(d.getTime())) {
    return String(value);
  }

  return d.toLocaleString(
    "th-TH",
    {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }
  );
}

function getOrderDateValue(order) {
  return (
    order?.createdAt ||
    order?.created_at ||
    order?.timestamp ||
    order?.date ||
    ""
  );
}


function isOrderInRange(order, fromYmd, toYmd) {
  const raw = getOrderDateValue(order);

 console.log(
   "ORDER DATE:",
   order.orderId,
   raw
 );

  if (!raw) return false;

  const d = new Date(raw);

 console.log(
   "PARSED:",
   order.orderId,
   d,
   Number.isNaN(d.getTime())
 );

  if (Number.isNaN(d.getTime())) return false;

  const orderYmd = toYmdLocal(d);
  if (fromYmd && orderYmd < fromYmd) return false;
  if (toYmd && orderYmd > toYmd) return false;
  return true;
}

function getDashboardProductCostMap() {
  return new Map(
    (Array.isArray(state.products) ? state.products : []).map(p => [
      String(p.productId || "").trim(),
      Number(p.costPrice || 0)
    ])
  );
}

function calculateDashboardSummary(orders) {
  const safeOrders = Array.isArray(orders) ? orders : [];
  const productCostMap = getDashboardProductCostMap();

  let totalSales = 0;
  let totalCost = 0;
  let totalProfit = 0;
  let totalQty = 0;

  safeOrders.forEach(order => {
    const items = Array.isArray(order.items) ? order.items : [];

    items.forEach(item => {
      const qty = Number(item.qty || 0);
      const sellPrice = Number(item.price || 0);
      const fallbackCost = productCostMap.get(String(item.productId || "").trim()) || 0;
      const costPrice = Number(
        item.costPrice ?? item.unitCost ?? fallbackCost
      );

      const lineSales = sellPrice * qty;
      const lineCost = costPrice * qty;

      totalSales += lineSales;
      totalCost += lineCost;
      totalProfit += (lineSales - lineCost);
      totalQty += qty;
    });
  });

  return {
    orderCount: safeOrders.length,
    totalQty,
    totalSales,
    totalCost,
    totalProfit
  };
}

function getAdminOrderPoQuery() {
  return String(state.admin.filters?.poQuery || "").trim().toLowerCase();
}

function orderMatchesAdminPoQuery(order) {
  const query = getAdminOrderPoQuery();
  if (!query) return true;

  return String(order?.poNumber || "")
    .trim()
    .toLowerCase()
    .includes(query);
}

function getDuplicatePoOrderMap() {
  const map = new Map();
  const orders = Array.isArray(state.admin.orders) ? state.admin.orders : [];

  orders.forEach(order => {
    const key = normalizePoNumberForCompare(order?.poNumber);
    if (!key) return;

    if (!map.has(key)) {
      map.set(key, []);
    }
    map.get(key).push(order);
  });

  return map;
}

function getDuplicatePoInfo(order, duplicatePoMap = getDuplicatePoOrderMap()) {
  const key = normalizePoNumberForCompare(order?.poNumber);
  if (!key) return null;

  const duplicates = duplicatePoMap.get(key) || [];
  if (duplicates.length < 2) return null;

  const currentOrderId = String(order?.orderId || "").trim();
  const otherOrder = duplicates.find(item =>
    String(item?.orderId || "").trim() !== currentOrderId
  );

  return {
    count: duplicates.length,
    otherOrderId: otherOrder?.orderId || ""
  };
}

function renderDuplicatePoBadge(order, duplicatePoMap) {

  if (!duplicateInfo) return "";

function formatAdminPoSummaryMoney(value) {
  const amount = Number(value);
  if (!Number.isFinite(amount)) return "-";
  return `Ã Â¸Â¿${amount.toLocaleString("th-TH")}`;

function buildAdminPoSummaryText(order) {
  const items = Array.isArray(order?.items) ? order.items : [];
  const lines = [
    `PO: ${order?.poNumber || "-"}`,
    `${t("orderNumber", "Ã Â¹â‚¬Ã Â¸Â¥Ã Â¸â€šÃ Â¸Â­Ã Â¸Â­Ã Â¹â‚¬Ã Â¸â€Ã Â¸Â­Ã Â¸Â£Ã Â¹Å’")}: ${order?.orderId || "-"}`,
    `${t("status", "Ã Â¸ÂªÃ Â¸â€“Ã Â¸Â²Ã Â¸â„¢Ã Â¸Â°")}: ${order?.status || "-"}`,
    `${t("source", "Ã Â¹ÂÃ Â¸Â«Ã Â¸Â¥Ã Â¹Ë†Ã Â¸â€¡Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¸Â¡Ã Â¸Â²")}: ${getAdminOrderSourceLabel(order)}`
  ];
lines.push("", `${t("itemList", "Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²")}:`);

  if (items.length) {
    items.forEach((item, index) => {
      const productId = String(item?.productId || "").trim() || "-";
      const name = String(item?.name || "").trim();
      const qty = Number(item?.qty) || 0;
      const price = Number(item?.price);
      const lineTotal = Number.isFinite(price)
        ? formatAdminPoSummaryMoney(price * qty)
        : "-";
      const itemName = name ? ` - ${name}` : "";

      lines.push(`${index + 1}. [${productId}]${itemName} x ${qty} = ${lineTotal}`);
    });
  } else {
    lines.push("-");
  }

  lines.push("", `${t("total", "Ã Â¸Â£Ã Â¸Â§Ã Â¸Â¡")}: ${formatAdminPoSummaryMoney(order?.total)}`);
  return lines.join("\n");
}

function getAdminPoPrintItemImage(item) {
  const directImage = String(item?.imageSnapshot || item?.image || item?.imageUrl || "").trim();
  if (directImage) return directImage;

  const productId = normalizeProductId(item?.productId || "");
  if (!productId) return "";

  const products = [
    ...(Array.isArray(state.products) ? state.products : []),
    ...(Array.isArray(state.admin?.products) ? state.admin.products : [])
  ];
  const product = products.find(productItem =>
    normalizeProductId(productItem?.productId || "") === productId
  );
  return String(product?.image || product?.imageUrl || "").trim();
}

async function openStockTimeline(force = false, options = {}) {

  const backAction = returnToAdminMenu

  const stockTimelineTitleId = "adminStockSheetTitle";
  const tr = t;
  const stockTimelineTitle = t("stockMovementHistory", "Ã Â¸â€ºÃ Â¸Â£Ã Â¸Â°Ã Â¸Â§Ã Â¸Â±Ã Â¸â€¢Ã Â¸Â´Ã Â¸â€žÃ Â¸Â§Ã Â¸Â²Ã Â¸Â¡Ã Â¹â‚¬Ã Â¸â€žÃ Â¸Â¥Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¹â€žÃ Â¸Â«Ã Â¸Â§Ã Â¸ÂªÃ Â¸â€¢Ã Â¹Å Ã Â¸Â­Ã Â¸Â");
  const backLabel = t("back", "Ã Â¸ÂÃ Â¸Â¥Ã Â¸Â±Ã Â¸Å¡");
  const viewMoreLabel = t("viewMoreDetails", "Ã Â¸â€Ã Â¸Â¹Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸Â¥Ã Â¸Â°Ã Â¹â‚¬Ã Â¸Â­Ã Â¸ÂµÃ Â¸Â¢Ã Â¸â€Ã Â¹â‚¬Ã Â¸Å¾Ã Â¸Â´Ã Â¹Ë†Ã Â¸Â¡Ã Â¹â‚¬Ã Â¸â€¢Ã Â¸Â´Ã Â¸Â¡");
  const hideDetailsLabel = t("hideDetails", "Ã Â¸â€¹Ã Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸Â¥Ã Â¸Â°Ã Â¹â‚¬Ã Â¸Â­Ã Â¸ÂµÃ Â¸Â¢Ã Â¸â€");

  closeOverlay(adminDashboardSheet);

  targetSheet.innerHTML = `
    <h3 id="${stockTimelineTitleId}">${stockTimelineTitle}</h3>
    <div class="loading">${t("loading", "Ã Â¸ÂÃ Â¸Â³Ã Â¸Â¥Ã Â¸Â±Ã Â¸â€¡Ã Â¹â€šÃ Â¸Â«Ã Â¸Â¥Ã Â¸â€...")}</div>
  `;

  openOverlay(targetSheet);

  try {
    const logs = await fetchStockLogs();
    const safeLogs = Array.isArray(logs) ? logs : [];

    const money = (value) => `Ã Â¸Â¿${Number(value || 0).toLocaleString("th-TH")}`;
    const esc = (value) => escapeHtml(value ?? "");

    // Ã¢Å“â€¦ ensure orders Ã Â¸Å¾Ã Â¸Â£Ã Â¹â€°Ã Â¸Â­Ã Â¸Â¡Ã Â¹Æ’Ã Â¸Å Ã Â¹â€°Ã Â¸ÂªÃ Â¸Â³Ã Â¸Â«Ã Â¸Â£Ã Â¸Â±Ã Â¸Å¡ fallback Ã Â¸Â£Ã Â¸Â²Ã Â¸â€žÃ Â¸Â²/Ã Â¸Â¢Ã Â¸Â­Ã Â¸â€Ã Â¸Â£Ã Â¸Â§Ã Â¸Â¡

      } catch (orderErr) {
        console.warn("openStockTimeline: preload orders failed", orderErr);
      }
    }

    // Ã¢Å“â€¦ fallback Ã Â¸Â£Ã Â¸Â²Ã Â¸â€žÃ Â¸Â²/Ã Â¸Â¢Ã Â¸Â­Ã Â¸â€Ã Â¸Â£Ã Â¸Â§Ã Â¸Â¡Ã Â¸Ë†Ã Â¸Â²Ã Â¸Â order Ã Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡ Ã Â¸â€“Ã Â¹â€°Ã Â¸Â² stock log Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Â¡Ã Â¸ÂµÃ Â¸Â£Ã Â¸Â²Ã Â¸â€žÃ Â¸Â²
    const orderLookup = new Map(
      (Array.isArray(state.admin.orders) ? state.admin.orders : []).map(o => [
        String(o.orderId || "").trim(),
        o
      ])
    );

    /* ================= GROUP ORDER OUT ================= */
    const orderMap = {};
    const singles = [];

 safeLogs.forEach(l => {
  const time = l.timestamp ? new Date(l.timestamp) : new Date();

  // Ã¢Å“â€¦ Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° orderId Ã Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡Ã Â¸Ë†Ã Â¸Â²Ã Â¸Â sheet (fallback Ã Â¹â‚¬Ã Â¸Å“Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸â€šÃ Â¸Â­Ã Â¸â€¡Ã Â¹â‚¬Ã Â¸ÂÃ Â¹Ë†Ã Â¸Â²)
  const orderRef = l.orderId || l.ref || null;

  if (l.type === "OUT" && orderRef) {
    const matchedOrder = orderLookup.get(String(orderRef).trim());
    const matchedOrderItem = Array.isArray(matchedOrder?.items)
      ? matchedOrder.items.find(item =>
          String(item.productId || "").trim() === String(l.productId || "").trim()
        )
      : null;

    const fallbackSalePrice = Number(
      l.salePrice ??
      l.price ??
      matchedOrderItem?.price ??
      0
    );

    const fallbackLineTotal = Number(
      l.lineTotal ??
      (fallbackSalePrice * Math.abs(Number(l.qty || 0)))
    );

    if (!orderMap[orderRef]) {
      orderMap[orderRef] = {
        orderId: orderRef,
        time,
        by: l.by || "-",
        note: l.note || l.reason || "",
        totalSalesAmount: Number(matchedOrder?.total || 0),
        items: []
      };
    }

    if (!orderMap[orderRef].note && (l.note || l.reason)) {
      orderMap[orderRef].note = l.note || l.reason || "";
    }

    // Ã Â¹Æ’Ã Â¸Å Ã Â¹â€°Ã Â¹â‚¬Ã Â¸Â§Ã Â¸Â¥Ã Â¸Â²Ã Â¸Â¥Ã Â¹Ë†Ã Â¸Â²Ã Â¸ÂªÃ Â¸Â¸Ã Â¸â€Ã Â¸â€šÃ Â¸Â­Ã Â¸â€¡ item Ã Â¹Æ’Ã Â¸â„¢ order Ã Â¹â‚¬Ã Â¸â€Ã Â¸ÂµÃ Â¸Â¢Ã Â¸Â§Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢
    if (time.getTime() > orderMap[orderRef].time.getTime()) {
      orderMap[orderRef].time = time;
    }

    // Ã¢Å“â€¦ Ã Â¸â€“Ã Â¹â€°Ã Â¸Â² order.total Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Â¡Ã Â¸Âµ Ã Â¸â€žÃ Â¹Ë†Ã Â¸Â­Ã Â¸Â¢Ã Â¸ÂªÃ Â¸Â°Ã Â¸ÂªÃ Â¸Â¡Ã Â¸Ë†Ã Â¸Â²Ã Â¸ÂÃ Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸Â¢Ã Â¹Ë†Ã Â¸Â­Ã Â¸Â¢
    if (!Number(orderMap[orderRef].totalSalesAmount)) {
      orderMap[orderRef].totalSalesAmount += fallbackLineTotal;
    }

    orderMap[orderRef].items.push({
      productId: l.productId,
      productName: l.productName || l.name || matchedOrderItem?.name || "",
      image: l.image || matchedOrderItem?.image || "",
      qty: Math.abs(Number(l.qty || 0)),
      before: l.before,
      after: l.after,
      salePrice: fallbackSalePrice,
      lineTotal: fallbackLineTotal
    });
  } else {
    singles.push({
      ...l,
      _time: time
    });
  }
});

    /* ================= BUILD TIMELINE ================= */
    const timeline = [];

    Object.values(orderMap).forEach(o => {
      timeline.push({

      timeline.push({

        image: l.image || "",

                          </div>
                          <div class="timeline-row">
                            ${tr("qtyChanged", "Ã Â¸Ë†Ã Â¸Â³Ã Â¸â„¢Ã Â¸Â§Ã Â¸â„¢Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¹â‚¬Ã Â¸â€ºÃ Â¸Â¥Ã Â¸ÂµÃ Â¹Ë†Ã Â¸Â¢Ã Â¸â„¢")}: -${Number(i.qty || 0)}
                            ${

function waitForAnimationFrames(count = 2) {
  return new Promise(resolve => {
    const next = remaining => {
      if (remaining <= 0) {
        resolve();
        return;
      }
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(() => next(remaining - 1));
      } else {
        setTimeout(() => next(remaining - 1), 16);
      }
    };
    next(Math.max(1, Number(count) || 1));
  });
}

function handleAddImagePreview(input){
  const file = input.files[0];
  if(!file) return;

 try {
   validateProductImageFile(file);
 } catch (err) {
   input.value = "";
   state.addImageFile = null;
   const img = document.getElementById("addImagePreview");
   if (img) {
     img.removeAttribute("src");
     img.style.display = "none";
   }
   showToast(err.message || t("invalidImageFile", "Ã Â¹â€žÃ Â¸Å¸Ã Â¸Â¥Ã Â¹Å’Ã Â¸Â£Ã Â¸Â¹Ã Â¸â€ºÃ Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸â€“Ã Â¸Â¹Ã Â¸ÂÃ Â¸â€¢Ã Â¹â€°Ã Â¸Â­Ã Â¸â€¡"), "error");
   return;
 }

  const reader = new FileReader();
  reader.onload = () => {
    const img = document.getElementById("addImagePreview");
    img.src = reader.result;
    img.style.display = "block";

    state.addImageFile = file; // Ã Â¹â‚¬Ã Â¸ÂÃ Â¹â€¡Ã Â¸Å¡Ã Â¹â€žÃ Â¸Â§Ã Â¹â€°Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° upload
  };
  reader.readAsDataURL(file);
}

 document.addEventListener("keydown", (e) => {
   const activeOverlay = [...document.querySelectorAll(".sheet.show, .side-menu.show")].pop();

   if (e.key === "Escape") {
     const filter = document.getElementById("filterDropdown");
     if (filter?.classList.contains("show")) {
       filter.classList.remove("show");
       document.querySelectorAll(".filter-btn[aria-expanded='true']")
         .forEach(b => syncExpanded(b, false));
       restoreTriggerFocus();
       return;
     }

     const viewerSearch = document.getElementById("viewerSearchWrap");
     if (viewerSearch?.classList.contains("active")) {
       toggleViewerSearch(viewerSearch.querySelector(".search-btn"));
       return;
     }

     const adminSearch = document.getElementById("adminSearchWrap");
     if (adminSearch?.classList.contains("active")) {
       toggleAdminSearch(adminSearch.querySelector(".search-btn"));
       return;
     }

    if (activeOverlay && !state.ui.backdropLocked) {
      if (activeOverlay === mainMenuSheet) return closeMainMenu();
      if (activeOverlay === adminStockSheet) return closeStockTimelineSheet();
      return closeOverlay(activeOverlay);
    }
   }

   if (e.key === "Tab" && activeOverlay) {
     const focusables = activeOverlay.querySelectorAll(
       'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
     );
     if (!focusables.length) return;

     const first = focusables[0];
     const last = focusables[focusables.length - 1];

    if (!activeOverlay.contains(document.activeElement)) {
      e.preventDefault();
      first.focus();
      return;
    }

     if (e.shiftKey && document.activeElement === first) {
       e.preventDefault();
       last.focus();
     } else if (!e.shiftKey && document.activeElement === last) {
       e.preventDefault();
       first.focus();
     }
   }
 });

async function uploadProductImage(file) {
  return new Promise((resolve, reject) => {
    try {
      validateProductImageFile(file);
    } catch (err) {
      reject(err);
      return;
    }

    // Ã°Å¸â€Â´ CHANGED: Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€° error Ã Â¹â‚¬Ã Â¸â€ºÃ Â¹â€¡Ã Â¸â„¢ Error object Ã Â¹â‚¬Ã Â¸ÂªÃ Â¸Â¡Ã Â¸Â­
    if (!state.admin || !state.admin.token) {
      reject(new Error("Missing admin token"));
      return;
    }

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        // Ã°Å¸â€Â´ CHANGED: Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢ reader.result Ã Â¸Â§Ã Â¹Ë†Ã Â¸Â²Ã Â¸â€¡/Ã Â¸Å“Ã Â¸Â´Ã Â¸â€Ã Â¸Â£Ã Â¸Â¹Ã Â¸â€ºÃ Â¹ÂÃ Â¸Å¡Ã Â¸Å¡
        const result = String(reader.result || "");
        const base64 = result.includes(",") ? result.split(",")[1] : "";
        if (!base64) {
          throw new Error("Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸ÂªÃ Â¸Â²Ã Â¸Â¡Ã Â¸Â²Ã Â¸Â£Ã Â¸â€“Ã Â¸Â­Ã Â¹Ë†Ã Â¸Â²Ã Â¸â„¢Ã Â¸â€šÃ Â¹â€°Ã Â¸Â­Ã Â¸Â¡Ã Â¸Â¹Ã Â¸Â¥Ã Â¸Â£Ã Â¸Â¹Ã Â¸â€ºÃ Â¸Â Ã Â¸Â²Ã Â¸Å¾Ã Â¹â€žÃ Â¸â€Ã Â¹â€°");
        }

        const formData = new FormData();
        formData.append("action", "uploadProductImage");
        formData.append("token", state.admin.token);
        formData.append("filename", file.name);
        formData.append("mimeType", file.type || "image/jpeg");
        formData.append("data", base64);

        // Ã°Å¸â€Â´ CHANGED: Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° fetchWithTimeout Ã Â¹ÂÃ Â¸Å¡Ã Â¸Å¡Ã Â¹â‚¬Ã Â¸â€Ã Â¸ÂµÃ Â¸Â¢Ã Â¸Â§Ã Â¸ÂÃ Â¸Â±Ã Â¸Å¡ API Ã Â¸Â­Ã Â¸Â·Ã Â¹Ë†Ã Â¸â„¢
        const res = await fetchWithTimeout(API_URL, {
          method: "POST",
          body: formData
        }, 30000);

        let json;
        try {
          json = await res.json();
        } catch (_) {
          throw new Error("Ã Â¸Â£Ã Â¸Â¹Ã Â¸â€ºÃ Â¹ÂÃ Â¸Å¡Ã Â¸Å¡Ã Â¸â€šÃ Â¹â€°Ã Â¸Â­Ã Â¸Â¡Ã Â¸Â¹Ã Â¸Â¥Ã Â¸â€¢Ã Â¸Â­Ã Â¸Å¡Ã Â¸ÂÃ Â¸Â¥Ã Â¸Â±Ã Â¸Å¡Ã Â¸Ë†Ã Â¸Â²Ã Â¸ÂÃ Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸Â­Ã Â¸Â±Ã Â¸â€ºÃ Â¹â€šÃ Â¸Â«Ã Â¸Â¥Ã Â¸â€Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸â€“Ã Â¸Â¹Ã Â¸ÂÃ Â¸â€¢Ã Â¹â€°Ã Â¸Â­Ã Â¸â€¡");
        }

        if (!json || json.success !== true || !json.data?.imageUrl) {
          const rawMessage = json?.message || json?.error || "Upload failed";

          // Ã°Å¸â€Â´ CHANGED: Ã Â¹ÂÃ Â¸â€ºÃ Â¸Â¥Ã Â¸â€¡ DriveApp error Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€° debug Ã Â¸â€¡Ã Â¹Ë†Ã Â¸Â²Ã Â¸Â¢
          if (String(rawMessage).includes("DriveApp")) {
            throw new Error("Ã Â¸Â­Ã Â¸Â±Ã Â¸â€ºÃ Â¹â€šÃ Â¸Â«Ã Â¸Â¥Ã Â¸â€Ã Â¸Â£Ã Â¸Â¹Ã Â¸â€ºÃ Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸ÂªÃ Â¸Â³Ã Â¹â‚¬Ã Â¸Â£Ã Â¹â€¡Ã Â¸Ë†: Apps Script Ã Â¸Â¢Ã Â¸Â±Ã Â¸â€¡Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Â¡Ã Â¸ÂµÃ Â¸ÂªÃ Â¸Â´Ã Â¸â€”Ã Â¸ËœÃ Â¸Â´Ã Â¹Å’Ã Â¹Æ’Ã Â¸Å Ã Â¹â€° DriveApp");
          }

          throw new Error(rawMessage);
        }

        resolve(json.data.imageUrl);
      } catch (err) {
        reject(err instanceof Error ? err : new Error(String(err || "Upload failed")));
      }
    };

    reader.onerror = () => {
      reject(new Error("File read error"));
    };

    reader.readAsDataURL(file);
  });
}

function parseLegacySizeVariant(product) {
  const productId = normalizeProductId(product?.productId);
  const name = String(product?.name || "").trim();
  const sizeFromName = name.match(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*Ã Â¸Â­Ã Â¸Â\s*([0-9]+))?\s*\)?\s*/i);
  const sizeFromSku = productId.match(/^(.*?)(XXL|XL|L|M|S)$/i);
  const sizeCode = String(sizeFromName?.[1] || sizeFromSku?.[2] || "").toUpperCase();
  const sizeMeta = SIZE_VARIANT_DETECTION[sizeCode];

  if (!productId || !sizeMeta || !sizeFromSku) return null;

  const parentProductId = normalizeProductId(sizeFromSku[1]);
  if (!parentProductId) return null;

  const chest = sizeFromName?.[2] || "";
  const variantValue = chest
    ? `${sizeCode} / Ã Â¸Â­Ã Â¸Â ${chest}`
    : sizeMeta.value;
  const displayName = name
    .replace(/^\s*\(?\s*Size\s+(XXL|XL|L|M|S)(?:\s*\/\s*Ã Â¸Â­Ã Â¸Â\s*[0-9]+)?\s*\)?\s*/i, "")
    .trim() || name;

  return {
    product,
    parentProductId,
    variantType: "size",
    variantValue,
    variantSortOrder: sizeMeta.order,
    displayName,
    sizeCode
  };
}

function getVariantScanResults() {
  const grouped = new Map();
  const singles = [];

  (Array.isArray(state.products) ? state.products : []).forEach(product => {
    if (isViewerVariantProduct(product)) return;
    const suggestion = parseLegacySizeVariant(product);
    if (!suggestion) return;

    if (!grouped.has(suggestion.parentProductId)) {
      grouped.set(suggestion.parentProductId, []);
    }
    grouped.get(suggestion.parentProductId).push(suggestion);
  });

  const groups = [];
  grouped.forEach((items, parentProductId) => {
    const sorted = items.sort((a, b) => a.variantSortOrder - b.variantSortOrder);
    if (sorted.length < 2) {
      singles.push(...sorted);
      return;
    }

    const displayNames = [...new Set(sorted.map(item => item.displayName).filter(Boolean))];
    const sizeCounts = sorted.reduce((map, item) => {
      map[item.sizeCode] = (map[item.sizeCode] || 0) + 1;
      return map;
    }, {});
    const warnings = [];
    if (displayNames.length > 1) {
      warnings.push("Ã Â¸Å Ã Â¸Â·Ã Â¹Ë†Ã Â¸Â­Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²Ã Â¹Æ’Ã Â¸â„¢Ã Â¸ÂÃ Â¸Â¥Ã Â¸Â¸Ã Â¹Ë†Ã Â¸Â¡Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¹â‚¬Ã Â¸Â«Ã Â¸Â¡Ã Â¸Â·Ã Â¸Â­Ã Â¸â„¢Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢Ã Â¸â€”Ã Â¸Â±Ã Â¹â€°Ã Â¸â€¡Ã Â¸Â«Ã Â¸Â¡Ã Â¸â€ Ã Â¸â€žÃ Â¸Â§Ã Â¸Â£Ã Â¸â€¢Ã Â¸Â£Ã Â¸Â§Ã Â¸Ë†Ã Â¸ÂªÃ Â¸Â­Ã Â¸Å¡Ã Â¸ÂÃ Â¹Ë†Ã Â¸Â­Ã Â¸â„¢Ã Â¸Å¡Ã Â¸Â±Ã Â¸â„¢Ã Â¸â€”Ã Â¸Â¶Ã Â¸ÂÃ Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡");
    }
    Object.entries(sizeCounts).forEach(([sizeCode, count]) => {
      if (count > 1) warnings.push(`Ã Â¸Å¾Ã Â¸Å¡Ã Â¹â€žÃ Â¸â€¹Ã Â¸ÂªÃ Â¹Å’ ${sizeCode} Ã Â¸â€¹Ã Â¹â€°Ã Â¸Â³Ã Â¹Æ’Ã Â¸â„¢Ã Â¸ÂÃ Â¸Â¥Ã Â¸Â¸Ã Â¹Ë†Ã Â¸Â¡Ã Â¸â„¢Ã Â¸ÂµÃ Â¹â€°`);
    });

    groups.push({
      parentProductId,
      displayName: displayNames[0] || sorted[0]?.displayName || "",
      items: sorted,
      warnings
    });
  });

  return {
    groups: groups.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId)),
    singles: singles.sort((a, b) => a.parentProductId.localeCompare(b.parentProductId))
  };
}

      await navigator.clipboard.writeText(text);

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";

function parseBulkProductImportText(rawText) {
  const text = String(rawText || "").replace(/\r/g, "").trimEnd();
  const errors = [];
  const items = [];

  if (!text.trim()) {
    return { items, errors };
  }

  const lines = text
    .split("\n")
    .filter(line => line.trim());

  const firstCells = splitTsvLine(lines[0]);
  const hasHeader = isBulkProductHeaderRow(firstCells);
  const dataLines = hasHeader ? lines.slice(1) : lines;
  const columns = hasHeader
    ? firstCells.map(normalizeBulkHeader)
    : BULK_PRODUCT_COLUMNS;
  const seenSkus = new Set();

  if (dataLines.length > 100) {
    errors.push(bulkImportError(0, "", "items", t("bulkImportMaxRows", "Ã Â¸â„¢Ã Â¸Â³Ã Â¹â‚¬Ã Â¸â€šÃ Â¹â€°Ã Â¸Â²Ã Â¹â€žÃ Â¸â€Ã Â¹â€°Ã Â¸ÂªÃ Â¸Â¹Ã Â¸â€¡Ã Â¸ÂªÃ Â¸Â¸Ã Â¸â€ 100 Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸â€¢Ã Â¹Ë†Ã Â¸Â­Ã Â¸â€žÃ Â¸Â£Ã Â¸Â±Ã Â¹â€°Ã Â¸â€¡")));
    return { items, errors };
  }

  dataLines.forEach((line, index) => {
    const rowNumber = index + 1;
    const cells = splitTsvLine(line);
    const row = {};

    columns.forEach((column, cellIndex) => {
      if (!column) return;
      row[column] = String(cells[cellIndex] || "").trim();
    });

    const item = normalizeBulkProductImportRow(row);
    validateBulkProductImportRow(item, rowNumber, seenSkus, errors);
    items.push(item);
  });

  if (items.length === 0) {
    errors.push(bulkImportError(1, "", "items", t("bulkImportNeedOneRow", "Ã Â¸ÂÃ Â¸Â£Ã Â¸Â¸Ã Â¸â€œÃ Â¸Â²Ã Â¹â‚¬Ã Â¸Å¾Ã Â¸Â´Ã Â¹Ë†Ã Â¸Â¡Ã Â¸â€šÃ Â¹â€°Ã Â¸Â­Ã Â¸Â¡Ã Â¸Â¹Ã Â¸Â¥Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²Ã Â¸Â­Ã Â¸Â¢Ã Â¹Ë†Ã Â¸Â²Ã Â¸â€¡Ã Â¸â„¢Ã Â¹â€°Ã Â¸Â­Ã Â¸Â¢ 1 Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£")));
  }

  return { items, errors };
}

function splitTsvLine(line) {
  return String(line || "").split("\t");
}

function isBulkProductHeaderRow(cells) {
  const normalized = cells.map(normalizeBulkHeader).filter(Boolean);
  return normalized.includes("productId") &&
    normalized.includes("name") &&
    normalized.includes("price");
}

function normalizeBulkHeader(value) {
  const key = String(value || "").trim().toLowerCase();
  const map = {
    productid: "productId",
    sku: "productId",
    name: "name",
    price: "price",
    costprice: "costPrice",
    cost: "costPrice",
    stock: "stock",
    qty: "stock",
    status: "status",
    image: "image",
    active: "active",
    note: "note",
    detailstext: "detailsText",
    details: "detailsText",
    compareimages: "compareImages",
    parentproductid: "parentProductId",
    parent: "parentProductId",
    groupid: "parentProductId",
    varianttype: "variantType",
    variantvalue: "variantValue",
    size: "variantValue",
    displayname: "displayName",
    groupname: "displayName",
    variantsortorder: "variantSortOrder",
    sortorder: "variantSortOrder"
  };
  return map[key] || "";
}

function normalizeBulkProductImportRow(row) {
  const stock = Number(row.stock);
  const status = Number.isInteger(stock) && stock === 0
    ? "out"
    : String(row.status || "").trim();

  return {
    productId: normalizeProductId(row.productId || ""),
    name: String(row.name || "").trim(),
    price: String(row.price || "").trim(),
    costPrice: String(row.costPrice || "").trim(),
    stock: String(row.stock || "").trim(),
    status,
    image: String(row.image || "").trim(),
    active: String(row.active || "").trim(),
    note: String(row.note || "").trim(),
    detailsText: String(row.detailsText || "").trim(),
    compareImages: String(row.compareImages || "").trim(),
    parentProductId: String(row.parentProductId || "").trim(),
    variantType: String(row.variantType || "").trim(),
    variantValue: String(row.variantValue || "").trim(),
    displayName: String(row.displayName || "").trim(),
    variantSortOrder: String(row.variantSortOrder || "").trim()
  };
}

function getBulkProductUpdateSelectedSkus() {
  const selectedSkus = Array.isArray(state.admin.bulkProductUpdate.selectedSkus)
    ? state.admin.bulkProductUpdate.selectedSkus
    : [];
  const seen = new Set();
  return selectedSkus
    .map(normalizeProductId)
    .filter(productId => {
      if (!productId || seen.has(productId)) return false;
      seen.add(productId);
      return true;
    });
}

function getBulkProductUpdateManualSkus() {
  return String(state.admin.bulkProductUpdate.skuText || "")
    .split(/[\s,]+/)
    .map(normalizeProductId)
    .filter(Boolean);
}

function getBulkProductUpdateCombinedSkus() {
  return getBulkProductUpdateSelectedSkus().concat(getBulkProductUpdateManualSkus());
}

function getBulkProductUpdatePickerProducts() {
  const bulkState = state.admin.bulkProductUpdate;
  const searchText = String(bulkState.pickerSearch || "").trim().toLowerCase();
  const rawStatusFilter = String(bulkState.pickerStatus || "all").trim().toLowerCase();
  const statusFilter = rawStatusFilter === "all" ? "all" : normalizeProductStatus(rawStatusFilter);
  const products = Array.isArray(state.products) ? state.products : [];

  return products.filter(product => {
    const productId = normalizeProductId(product.productId);
    const name = String(product.name || "").toLowerCase();
    const status = normalizeProductStatus(product.status);
    const matchesSearch = !searchText ||
      productId.toLowerCase().includes(searchText) ||
      name.includes(searchText);
    const matchesStatus = !statusFilter ||
      statusFilter === "all" ||
      status === statusFilter;
    return matchesSearch && matchesStatus;
  });
}

function toggleBulkProductUpdateProduct(productId, checked) {
  const normalizedId = normalizeProductId(productId);
  if (!normalizedId) return;

  const selected = new Set(getBulkProductUpdateSelectedSkus());
  if (checked) {
    selected.add(normalizedId);
  } else {
    selected.delete(normalizedId);
  }
  state.admin.bulkProductUpdate.selectedSkus = Array.from(selected);
  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheetPreservingPickerScroll();
}

  invalidateBulkProductUpdatePreview();
  renderBulkProductUpdateSheet();

function parseBulkProductUpdateInput() {
  const bulkState = state.admin.bulkProductUpdate;
  const field = bulkState.field || "price";
  const valueResult = parseBulkProductUpdateValue(field, bulkState.value);
  const skus = getBulkProductUpdateCombinedSkus();
  const errors = [];
  const items = [];
  const seenSkus = new Set();
  const products = Array.isArray(state.products) ? state.products : [];
  const productMap = new Map(
    products.map(product => [
      normalizeProductId(product.productId),
      product
    ])
  );

  if (!skus.length && !String(bulkState.value ?? "").trim()) {
    return { items, errors };
  }

  if (!skus.length) {
    errors.push(bulkImportError(1, "", "productId", t("bulkUpdateSkuRequiredOne", "Ã Â¸ÂÃ Â¸Â£Ã Â¸Â¸Ã Â¸â€œÃ Â¸Â²Ã Â¸Â£Ã Â¸Â°Ã Â¸Å¡Ã Â¸Â¸ SKU Ã Â¸Â­Ã Â¸Â¢Ã Â¹Ë†Ã Â¸Â²Ã Â¸â€¡Ã Â¸â„¢Ã Â¹â€°Ã Â¸Â­Ã Â¸Â¢ 1 Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£")));
    return { items, errors };
  }

  if (skus.length > 100) {
    errors.push(bulkImportError(0, "", "items", t("bulkUpdateMaxRows", "Ã Â¸Â­Ã Â¸Â±Ã Â¸â€ºÃ Â¹â‚¬Ã Â¸â€Ã Â¸â€¢Ã Â¹â€žÃ Â¸â€Ã Â¹â€°Ã Â¸ÂªÃ Â¸Â¹Ã Â¸â€¡Ã Â¸ÂªÃ Â¸Â¸Ã Â¸â€ 100 Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸â€¢Ã Â¹Ë†Ã Â¸Â­Ã Â¸â€žÃ Â¸Â£Ã Â¸Â±Ã Â¹â€°Ã Â¸â€¡")));
    return { items, errors };
  }

  skus.forEach((productId, index) => {
    const rowNumber = index + 1;
    const product = productMap.get(productId) || null;
    const item = {
      row: rowNumber,
      productId,
      product,
      field,
      oldValue: product ? product[field] : "",
      newValue: valueResult.value
    };

    if (!productId) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateSkuRequired", "Ã Â¸ÂÃ Â¸Â£Ã Â¸Â¸Ã Â¸â€œÃ Â¸Â²Ã Â¸Â£Ã Â¸Â°Ã Â¸Å¡Ã Â¸Â¸ SKU")));
    } else if (seenSkus.has(productId)) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateDuplicateSku", "SKU Ã Â¸â€¹Ã Â¹â€°Ã Â¸Â³Ã Â¹Æ’Ã Â¸â„¢Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¹â‚¬Ã Â¸Â¥Ã Â¸Â·Ã Â¸Â­Ã Â¸Â")));
    }

    if (productId) {
      seenSkus.add(productId);
    }

    if (products.length && !product) {
      errors.push(bulkImportError(rowNumber, productId, "productId", t("bulkUpdateProductNotFound", "Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë†Ã Â¸Å¾Ã Â¸Å¡Ã Â¸ÂªÃ Â¸Â´Ã Â¸â„¢Ã Â¸â€žÃ Â¹â€°Ã Â¸Â²Ã Â¹Æ’Ã Â¸â„¢Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£Ã Â¸â€ºÃ Â¸Â±Ã Â¸Ë†Ã Â¸Ë†Ã Â¸Â¸Ã Â¸Å¡Ã Â¸Â±Ã Â¸â„¢")));
    }

    if (!valueResult.valid) {
      errors.push(bulkImportError(rowNumber, productId, field, valueResult.message));
    }

    items.push(item);
  });

  if (!items.length) {
    errors.push(bulkImportError(1, "", "productId", t("bulkUpdateSkuRequiredOne", "Ã Â¸ÂÃ Â¸Â£Ã Â¸Â¸Ã Â¸â€œÃ Â¸Â²Ã Â¸Â£Ã Â¸Â°Ã Â¸Å¡Ã Â¸Â¸ SKU Ã Â¸Â­Ã Â¸Â¢Ã Â¹Ë†Ã Â¸Â²Ã Â¸â€¡Ã Â¸â„¢Ã Â¹â€°Ã Â¸Â­Ã Â¸Â¢ 1 Ã Â¸Â£Ã Â¸Â²Ã Â¸Â¢Ã Â¸ÂÃ Â¸Â²Ã Â¸Â£")));
  }

  return { items, errors };
}

function syncBulkProductUpdatePreviewGateUi() {
  const submitButton = document.getElementById("bulkProductUpdateSubmitButton");
  if (submitButton) {
    submitButton.disabled = true;

  const status = document.getElementById("bulkProductUpdateStatusHost");
  if (status) {
    status.innerHTML = renderBulkProductUpdateStatus([], []);
  }

  const success = document.getElementById("bulkProductUpdateSuccessHost");
  if (success) {
    success.innerHTML = "";

  const preview = document.getElementById("bulkProductUpdatePreviewHost");
  if (preview) {
    preview.innerHTML = renderBulkProductUpdatePreview([], []);
  }
}

function parseNonNegativeNumber(value) {
  const text = String(value ?? "").trim();
  if (text === "") return { valid: true, value: 0 };
  const number = Number(text);
  return { valid: Number.isFinite(number) && number >= 0, value: number };
}


function normalizePoNumberForCompare(value) {
  return String(value || "").trim().toLowerCase();
}

function findDuplicatePoOrders(poNumber) {
  const normalizedPo = normalizePoNumberForCompare(poNumber);
  if (!normalizedPo || !Array.isArray(state.admin.orders)) return [];

  return state.admin.orders.filter(order =>
    normalizePoNumberForCompare(order?.poNumber) === normalizedPo
  );
}


async function checkDuplicatePo(poNumber) {
  const form = new URLSearchParams();
  form.append("action", "checkDuplicatePo");
  form.append("poNumber", String(poNumber || "").trim());

  const res = await fetchWithTimeout(API_URL, {
    method: "POST",
    body: form
  }, 8000);
  const json = await res.json();

  if (!json || json.success !== true) {
    throw new Error(json?.message || json?.error || "Duplicate PO lookup failed");
  }

  return json.data || { duplicate: false, matches: [] };
}

  const matches = Array.isArray(result?.matches) ? result.matches : [];
  if (!result?.duplicate || !matches.length) return true;

  const detailText = matches
    .slice(0, 3)

function numberToThaiText(num) {
  if (isNaN(num)) return "";

  const digit = ["Ã Â¸Â¨Ã Â¸Â¹Ã Â¸â„¢Ã Â¸Â¢Ã Â¹Å’", "Ã Â¸Â«Ã Â¸â„¢Ã Â¸Â¶Ã Â¹Ë†Ã Â¸â€¡", "Ã Â¸ÂªÃ Â¸Â­Ã Â¸â€¡", "Ã Â¸ÂªÃ Â¸Â²Ã Â¸Â¡", "Ã Â¸ÂªÃ Â¸ÂµÃ Â¹Ë†", "Ã Â¸Â«Ã Â¹â€°Ã Â¸Â²", "Ã Â¸Â«Ã Â¸Â", "Ã Â¹â‚¬Ã Â¸Ë†Ã Â¹â€¡Ã Â¸â€", "Ã Â¹ÂÃ Â¸â€ºÃ Â¸â€", "Ã Â¹â‚¬Ã Â¸ÂÃ Â¹â€°Ã Â¸Â²"];
  const position = ["", "Ã Â¸ÂªÃ Â¸Â´Ã Â¸Å¡", "Ã Â¸Â£Ã Â¹â€°Ã Â¸Â­Ã Â¸Â¢", "Ã Â¸Å¾Ã Â¸Â±Ã Â¸â„¢", "Ã Â¸Â«Ã Â¸Â¡Ã Â¸Â·Ã Â¹Ë†Ã Â¸â„¢", "Ã Â¹ÂÃ Â¸ÂªÃ Â¸â„¢", "Ã Â¸Â¥Ã Â¹â€°Ã Â¸Â²Ã Â¸â„¢"];

  function convert(n) {
    let result = "";
    const str = parseInt(n, 10).toString();
    const len = str.length;

    for (let i = 0; i < len; i++) {
      const d = parseInt(str.charAt(i));
      const pos = len - i - 1;

      if (d === 0) continue;

      if (pos === 0 && d === 1 && len > 1) {
        result += "Ã Â¹â‚¬Ã Â¸Â­Ã Â¹â€¡Ã Â¸â€";
      } else if (pos === 1 && d === 2) {
        result += "Ã Â¸Â¢Ã Â¸ÂµÃ Â¹Ë†";
      } else if (pos === 1 && d === 1) {
        result += "";
      } else {
        result += digit[d];
      }

      result += position[pos];
    }

    return result;
  }

  if (num === 0) return "Ã Â¸Â¨Ã Â¸Â¹Ã Â¸â„¢Ã Â¸Â¢Ã Â¹Å’Ã Â¸Å¡Ã Â¸Â²Ã Â¸â€”Ã Â¸â€“Ã Â¹â€°Ã Â¸Â§Ã Â¸â„¢";

  return convert(num) + "Ã Â¸Å¡Ã Â¸Â²Ã Â¸â€”Ã Â¸â€“Ã Â¹â€°Ã Â¸Â§Ã Â¸â„¢";
}

    // expects: "0 10px 30px rgba(0,0,0,.08)" (single shadow)
    const m = String(v).match(

  const varMatch = String(canvasShadowRaw).match(/var\((--[^)]+)\)/);
  if (varMatch && varMatch[1]) {

  }
  const sh = parseShadowToken(canvasShadowRaw);
  if (sh) {

    ctx.lineTo(x, y0 + r);

  ctx.fill();

ctx.font = `700 ${cfg.textSize + 4}px -apple-system`;

ctx.fillText(

 );
 ctx.fillText(
   "Ã Â¸â€¢.Ã Â¸Â«Ã Â¸â„¢Ã Â¸Â­Ã Â¸â€¡Ã Â¹ÂÃ Â¸â€šÃ Â¸Â¡ Ã Â¸Â­.Ã Â¸Â«Ã Â¸â„¢Ã Â¸Â­Ã Â¸â€¡Ã Â¹ÂÃ Â¸â€ž",
   cfg.padding,
   headerTopY + cfg.lineHeight * 2
 );
 ctx.fillText(
   "Ã Â¸Ë†.Ã Â¸ÂªÃ Â¸Â£Ã Â¸Â°Ã Â¸Å¡Ã Â¸Â¸Ã Â¸Â£Ã Â¸Âµ 18140",
   cfg.padding,
   headerTopY + cfg.lineHeight * 3
 );

/* ===== DOCUMENT META ===== */
const rightX = canvas.width - cfg.padding;

  ctx.textAlign = "right";

 ctx.fillText(`PO: ${po}`, rightX, headerTopY + cfg.lineHeight);
 const docDate = new Date(order.createdAt);
 ctx.fillText(

   rightX,

 );

  ctx.textAlign = "left";

  /* ===== DIVIDER ===== */
  ctx.strokeStyle = "#dddddd";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);

  ctx.stroke();

/* ================= ITEMS (GRID TABLE) ================= */

  ctx.fillText("Ã Â¸Â£Ã Â¸Â§Ã Â¸Â¡", col.total, y);

  y += 16;

  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(cfg.padding, y);
  ctx.lineTo(canvas.width - cfg.padding, y);
  ctx.stroke();

  y += rowHeight - 16;

  ctx.font = `${cfg.textSize}px -apple-system`;

  items.forEach((i, index) => {

    ctx.fillText(String(index + 1), col.no, y);

async function restoreAdminSessionIfValid() {
  const restored = loadAdminSession();
  if (!restored?.token || !restored?.expiredAt) return false;

  // expired guard
  if (Date.now() > new Date(restored.expiredAt).getTime()) {
    clearAdminSession();
    return false;
  }

  try {
    // Ã¢Å“â€¦ lightweight validate (POST Ã Â¹Æ’Ã Â¸Â«Ã Â¹â€°Ã Â¸â€¢Ã Â¸Â£Ã Â¸â€¡ backend)
    const form = new URLSearchParams();
    form.append("action", "orders");
    form.append("token", restored.token);

    const res = await fetch(API_URL, {
      method: "POST",
      body: form
    });

    const json = await res.json();

    if (json?.success === true) {
      state.admin.loggedIn = true;
      state.admin.user = restored.username || null;
      state.admin.token = restored.token;
      state.admin.expiredAt = restored.expiredAt;

      // Ã¢Ââ€” Ã Â¹â€žÃ Â¸Â¡Ã Â¹Ë† set state.mode Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¸â„¢Ã Â¸ÂµÃ Â¹Ë† (Ã Â¸ÂÃ Â¸Â±Ã Â¸â„¢Ã Â¸ÂÃ Â¸Â£Ã Â¸Â°Ã Â¸â€”Ã Â¸Å¡ flow)
      return true;
    }
  } catch (e) {
    console.warn("restore admin failed", e);
  }

  clearAdminSession();
  return false;
}

// Ã°Å¸â€Â DEBUG: Trace CSS winners for #floatingBar
// Ã Â¹â‚¬Ã Â¸â€ºÃ Â¹â€°Ã Â¸Â²Ã Â¸Â«Ã Â¸Â¡Ã Â¸Â²Ã Â¸Â¢: Ã Â¸Â«Ã Â¸Â² "rule Ã Â¹â€žÃ Â¸Â«Ã Â¸â„¢" Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¸Å Ã Â¸â„¢Ã Â¸Â° opacity/transform Ã Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡
// =========================
window.traceBarCSS = function traceBarCSS(){
  const bar = document.getElementById("floatingBar");
  if (!bar) { console.warn("[traceBarCSS] #floatingBar not found"); return []; }

  const props = ["opacity","transform","pointer-events"];
  const out = [];

  const tryPushRule = (sheet, rule, ruleIndex, sel) => {
    const style = rule.style;
    const hit = {
      sheet: sheet.href || "[inline <style>]",
      ruleIndex,
      selector: sel,
      cssText: rule.cssText
    };
    // Ã Â¹â‚¬Ã Â¸ÂÃ Â¹â€¡Ã Â¸Å¡Ã Â¹â‚¬Ã Â¸â€°Ã Â¸Å¾Ã Â¸Â²Ã Â¸Â°Ã Â¸â€žÃ Â¹Ë†Ã Â¸Â²Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¹â‚¬Ã Â¸ÂÃ Â¸ÂµÃ Â¹Ë†Ã Â¸Â¢Ã Â¸Â§Ã Â¸â€šÃ Â¹â€°Ã Â¸Â­Ã Â¸â€¡
    props.forEach(p => {
      const v = style.getPropertyValue(p);
      if (v) {
        hit[p] = v.trim();
        hit[p + "_important"] = style.getPropertyPriority(p) === "important";
      }
    });
    // Ã Â¸â€Ã Â¸Â±Ã Â¸â„¢Ã Â¹â‚¬Ã Â¸â€°Ã Â¸Å¾Ã Â¸Â²Ã Â¸Â° rule Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¹ÂÃ Â¸â€¢Ã Â¸Â° props Ã Â¸Ë†Ã Â¸Â£Ã Â¸Â´Ã Â¸â€¡
    if (props.some(p => hit[p])) out.push(hit);
  };

  for (const sheet of Array.from(document.styleSheets)) {
    let rules;
    try { rules = sheet.cssRules; } catch(e) { continue; } // cross-origin
    if (!rules) continue;

    for (let i = 0; i < rules.length; i++) {
      const r = rules[i];
      if (!r || !r.selectorText) continue;
      // Ã Â¸Â£Ã Â¸Â­Ã Â¸â€¡Ã Â¸Â£Ã Â¸Â±Ã Â¸Å¡ selector Ã Â¸Â«Ã Â¸Â¥Ã Â¸Â²Ã Â¸Â¢Ã Â¸â€¢Ã Â¸Â±Ã Â¸Â§Ã Â¸â€žÃ Â¸Â±Ã Â¹Ë†Ã Â¸â„¢Ã Â¸â€Ã Â¹â€°Ã Â¸Â§Ã Â¸Â¢ comma
      const sels = r.selectorText.split(",").map(s => s.trim()).filter(Boolean);
      for (const sel of sels) {
        try {
          if (bar.matches(sel)) {
            tryPushRule(sheet, r, i, sel);
          }
        } catch(_) {}
      }
    }
  }

  const cs = getComputedStyle(bar);
  console.log("===== traceBarCSS =====");
  console.log("className:", bar.className);
  console.table({
    computed_opacity: cs.opacity,
    computed_transform: cs.transform,
    computed_pointerEvents: cs.pointerEvents
  });
  console.table(out);
  return out;
};

  // 2) spy style attribute changes (Ã Â¸Â£Ã Â¸Â§Ã Â¸Â¡Ã Â¸â€“Ã Â¸Â¶Ã Â¸â€¡ bar.style.opacity/transform Ã Â¸â€”Ã Â¸ÂµÃ Â¹Ë†Ã Â¹â€žÃ Â¸â€ºÃ Â¸Â¥Ã Â¸â€¡Ã Â¹â‚¬Ã Â¸â€ºÃ Â¹â€¡Ã Â¸â„¢ inline)
  const mo = new MutationObserver((list) => {

        console.trace();

  });
  mo.observe(bar, { attributes: true, attributeFilter: ["style"] });
  bar.__spyMO = mo;

  console.log("Ã¢Å“â€¦ spyBar installed. Now reproduce the bug.");
};
